worker_processes auto;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Use Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # HTTP to HTTPS redirection
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server proxying to Gunicorn
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/dsm.crt;
        ssl_certificate_key /etc/nginx/ssl/dsm.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Max upload size
        client_max_body_size 16M;

        location / {
            # Use variable to force DNS re-resolution
            set $upstream_app web;
            proxy_pass http://$upstream_app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
