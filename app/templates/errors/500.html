{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
  <div class="col-md-8 col-lg-6 text-center">
    <div class="mb-4">
      <i class="bi bi-exclamation-octagon text-danger" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-4 fw-bold">500</h1>
    <h2 class="h4 text-muted mb-3">Server Error</h2>
    <p class="text-muted mb-4">
      Something went wrong on our end. The error has been logged and we will look into it.
      Please try again in a few moments.
    </p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i> Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
