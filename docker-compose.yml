# =============================================================================
# Dive Service Management - Docker Compose
# 5 services: web, db, redis, worker, beat
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Application (Flask + Gunicorn)
  # ---------------------------------------------------------------------------
  web:
    build: .
    image: dsm-web:latest
    container_name: dsm-web
    ports:
      - "${DSM_BIND_ADDRESS:-127.0.0.1}:${DSM_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./instance:/app/instance
      - ./backups:/app/backups
    restart: unless-stopped
    networks:
      - dsm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 30s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  # ---------------------------------------------------------------------------
  # MariaDB 11 LTS
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:lts
    container_name: dsm-db
    volumes:
      - dsm-db-data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - ./docker/db/conf:/etc/mysql/conf.d
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-dsm}
      MARIADB_USER: ${MARIADB_USER:-dsm}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    restart: unless-stopped
    networks:
      - dsm-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 30s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 250M

  # ---------------------------------------------------------------------------
  # Redis 7 (cache, sessions, task broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dsm-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-dsm_redis_dev}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dsm_redis_dev}
    volumes:
      - dsm-redis-data:/data
    restart: unless-stopped
    networks:
      - dsm-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 30s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 100M

  # ---------------------------------------------------------------------------
  # Celery Worker (async tasks: PDF generation, exports, notifications)
  # ---------------------------------------------------------------------------
  worker:
    build: .
    image: dsm-web:latest
    container_name: dsm-worker
    init: true
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - dsm-net
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 30s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 250M

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduled tasks: low-stock checks, overdue reminders)
  # ---------------------------------------------------------------------------
  beat:
    build: .
    image: dsm-web:latest
    container_name: dsm-beat
    init: true
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    networks:
      - dsm-net
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule && find /tmp/celerybeat-schedule -mmin -3 | grep -q ."]
      interval: 60s
      timeout: 30s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 150M

# ---------------------------------------------------------------------------
# Persistent Volumes
# ---------------------------------------------------------------------------
volumes:
  dsm-db-data:
    driver: local
  dsm-redis-data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  dsm-net:
    driver: bridge
