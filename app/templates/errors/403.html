{% extends "base.html" %}

{% block title %}403 - Access Denied{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
  <div class="col-md-8 col-lg-6 text-center">
    <div class="mb-4">
      <i class="bi bi-shield-lock text-warning" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-4 fw-bold">403</h1>
    <h2 class="h4 text-muted mb-3">Access Denied</h2>
    <p class="text-muted mb-4">
      You do not have permission to access this page.
      If you believe this is an error, please contact your administrator.
    </p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i> Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
